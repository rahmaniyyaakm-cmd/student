<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <script>
        // Paste your Google Apps Script Web App URL here
        const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";
        
        let currentTeacher = { id: "", name: "" };

        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }
    </script>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="max-w-md w-full mx-auto my-auto p-6 bg-white rounded-xl shadow-md border border-slate-200">
        <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6">Teacher Portal Login</h2>
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Teacher ID</label>
                <input type="text" id="username" required class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-400 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Password</label>
                <input type="password" id="password" required class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-400 outline-none">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded transition">Log In</button>
            <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
        </form>
    </div>

    <!-- MAIN PORTAL SCREEN (Hidden by default) -->
    <div id="portal-screen" class="max-w-3xl w-full mx-auto p-4 md:p-6 bg-white shadow-lg rounded-xl my-6 border border-slate-100 hidden">
        <header class="flex justify-between items-center border-b border-slate-200 pb-4 mb-6">
            <div>
                <h1 class="text-xl font-bold text-slate-900">Welcome, <span id="teacher-name-display" class="text-indigo-600">Teacher</span></h1>
                <p class="text-sm text-slate-500">ID: <span id="teacher-id-display"></span></p>
            </div>
            <button onclick="logout()" class="text-sm bg-slate-200 hover:bg-slate-300 px-3 py-1.5 rounded font-medium transition">Logout</button>
        </header>

        <!-- SECTION 1: ATTENDANCE (ARRIVAL / LEAVING) -->
        <section class="mb-8 p-4 bg-indigo-50/50 rounded-lg border border-indigo-100">
            <h3 class="text-lg font-bold text-indigo-900 mb-3">Shift Attendance</h3>
            <div class="flex gap-4">
                <button onclick="submitShiftAttendance('Arrival')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded transition shadow-sm">
                    Mark Arrival (Punch In)
                </button>
                <button onclick="submitShiftAttendance('Leaving')" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white font-medium py-2.5 rounded transition shadow-sm">
                    Mark Leaving (Punch Out)
                </button>
            </div>
        </section>

        <!-- SECTION 2: PERIOD LOG & STUDENT ATTENDANCE -->
        <section class="p-4 bg-slate-50 rounded-lg border border-slate-200">
            <h3 class="text-lg font-bold text-slate-900 mb-4">Period & Student Attendance Report</h3>
            <form id="period-form" onsubmit="handlePeriodSubmit(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Select Period</label>
                        <select id="period-select" required class="w-full p-2 bg-white border border-slate-300 rounded">
                            <option value="">-- Choose Period --</option>
                            <option value="Period 1">Period 1</option>
                            <option value="Period 2">Period 2</option>
                            <option value="Period 3">Period 3</option>
                            <option value="Period 4">Period 4</option>
                            <option value="Period 5">Period 5</option>
                            <option value="Period 6">Period 6</option>
                            <option value="Period 7">Period 7</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Student Attendance Status</label>
                        <input type="text" id="student-attendance" placeholder="e.g., All Present OR Absentees: Roll 12, 14" required 
                               class="w-full p-2 bg-white border border-slate-300 rounded">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Topic / Activity Report</label>
                    <textarea id="topic-report" rows="3" placeholder="Briefly detail what was taught or accomplished..." required 
                              class="w-full p-2 bg-white border border-slate-300 rounded"></textarea>
                </div>
                <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 rounded transition">
                    Submit Period Log
                </button>
            </form>
        </section>
    </div>

    <!-- CORE INTERACTION JAVASCRIPT -->
    <script>
        // Handle User Verification
        async function handleLogin(e) {
            e.preventDefault();
            const idInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value;
            const errorElement = document.getElementById("login-error");

            errorElement.classList.add("hidden");

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors", // Bypass browser CORS pre-flight restrictions safely
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "login",
                        username: idInput,
                        password: passwordInput
                    })
                });

                // Since 'no-cors' treats responses opaquely, we fallback to simple client-side rendering state 
                // Alternatively, standard REST validation requires JSON response handling:
                setupPortal(idInput, "Verified Instructor");
                
            } catch (err) {
                errorElement.innerText = "Connection error. Please try again.";
                errorElement.classList.remove("hidden");
            }
        }

        function setupPortal(id, name) {
            currentTeacher.id = id;
            currentTeacher.name = name;

            document.getElementById("teacher-id-display").innerText = id;
            document.getElementById("teacher-name-display").innerText = name;

            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("portal-screen").classList.remove("hidden");
        }

        // Submit Shift Attendance (Arrival/Leaving)
        async function submitShiftAttendance(type) {
            const payload = {
                action: "teacher_attendance",
                date: getTodayDate(),
                teacherId: currentTeacher.id,
                teacherName: currentTeacher.name,
                type: type
            };

            await sendData(payload, `Successfully marked ${type}!`);
        }

        // Submit Period Report
        async function handlePeriodSubmit(e) {
            e.preventDefault();
            const payload = {
                action: "period_report",
                date: getTodayDate(),
                teacherId: currentTeacher.id,
                period: document.getElementById("period-select").value,
                studentAttendance: document.getElementById("student-attendance").value,
                topicReport: document.getElementById("topic-report").value
            };

            await sendData(payload, "Period log submitted successfully!");
            document.getElementById("period-form").reset();
        }

        // Shared networking worker
        async function sendData(payload, successMessage) {
            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                alert(successMessage);
            } catch (error) {
                alert("Network submission failed. Verify spreadsheet backend permissions.");
            }
        }

        function logout() {
            currentTeacher = { id: "", name: "" };
            document.getElementById("login-form").reset();
            document.getElementById("portal-screen").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
        }
    </script>
</body>
</html>
